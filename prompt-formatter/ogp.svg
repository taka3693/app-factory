<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-gradient)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="#667eea" opacity="0.1"/>
  <circle cx="1100" cy="530" r="200" fill="#764ba2" opacity="0.1"/>

  <!-- Title -->
  <text x="600" y="250" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="72" font-weight="bold" fill="url(#text-gradient)">
    ✨ AIプロンプト整形ツール
  </text>

  <!-- Subtitle -->
  <text x="600" y="330" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="36" fill="#eaeaea">
    プロンプトを各AIモデル用に最適化
  </text>

  <!-- Features -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" fill="#b0b0b0">
    <text x="600" y="420" text-anchor="middle">• ChatGPT • Claude • Gemini対応</text>
    <text x="600" y="470" text-anchor="middle">• ワンクリックで整形・コピー</text>
    <text x="600" y="520" text-anchor="middle">• トークン数を自動計算</text>
  </g>

  <!-- URL -->
  <text x="600" y="590" text-anchor="middle" font-family="monospace" font-size="24" fill="#e94560">
    taka3693.github.io/app-factory/prompt-formatter/
  </text>
