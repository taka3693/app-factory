<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIプロンプト整形ツール</title>

    <!-- OGP Meta Tags -->
    <meta property="og:title" content="AIプロンプト整形ツール">
    <meta property="og:description" content="プロンプトを各AIモデル用に最適化">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://taka3693.github.io/app-factory/prompt-formatter/">
    <meta property="og:image" content="https://taka3693.github.io/app-factory/prompt-formatter/ogp.svg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="AIプロンプト整形ツール">
    <meta name="twitter:description" content="プロンプトを各AIモデル用に最適化">
    <meta name="twitter:image" content="https://taka3693.github.io/app-factory/prompt-formatter/ogp.svg">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-tertiary: #0f3460;
            --text-primary: #eaeaea;
            --text-secondary: #b0b0b0;
            --accent: #e94560;
            --accent-hover: #ff6b6b;
            --border: #2a2a4a;
            --success: #10b981;
        }

        /* Light mode variables */
        [data-theme="light"] {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-tertiary: #e8e8e8;
            --text-primary: #333333;
            --text-secondary: #666666;
            --accent: #e94560;
            --accent-hover: #ff6b6b;
            --border: #d0d0d0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            transition: background 0.3s, color 0.3s;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid var(--border);
            position: relative;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        /* Theme toggle button */
        .theme-toggle {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.2s;
            color: var(--text-primary);
        }

        .theme-toggle:hover {
            background: var(--accent);
            border-color: var(--accent);
        }

        .controls {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: var(--bg-secondary);
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .control-group {
            flex: 1;
            min-width: 200px;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
        }

        select, button {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
        }

        select:focus, button:focus {
            outline: none;
            border-color: var(--accent);
        }

        button {
            background: var(--accent);
            border: none;
            font-weight: 600;
        }

        button:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .button-group {
            display: flex;
            gap: 0.5rem;
        }

        .button-group button {
            flex: 1;
        }

        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 768px) {
            .editor-container {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.5rem;
                white-space: normal;
            }

            .subtitle {
                font-size: 0.9rem;
            }

            .controls {
                flex-direction: column;
            }
        }

        .editor-box {
            background: var(--bg-secondary);
            border-radius: 8px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .editor-header {
            padding: 1rem;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .editor-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .stats {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        textarea {
            width: 100%;
            min-height: 400px;
            padding: 1rem;
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: none;
            resize: vertical;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        textarea:focus {
            outline: none;
        }

        .copy-btn {
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
        }

        .copy-btn.copied {
            background: var(--success);
            border-color: var(--success);
        }

        .tips {
            background: var(--bg-secondary);
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-top: 2rem;
        }

        .tips h3 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: var(--accent);
        }

        .tips ul {
            list-style: none;
            padding: 0;
        }

        .tips li {
            padding: 0.5rem 0;
            padding-left: 1.5rem;
            position: relative;
        }

        .tips li::before {
            content: "•";
            position: absolute;
            left: 0.5rem;
            color: var(--accent);
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 3rem;
            border-top: 1px solid var(--border);
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.2s;
        }

        footer a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        .highlight {
            background: rgba(233, 69, 96, 0.2);
            padding: 0.2rem 0.4rem;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <button class="theme-toggle" onclick="toggleTheme()" title="ダークモード切り替え">🌙</button>
            <h1>✨ AIプロンプト整形ツール</h1>
            <p class="subtitle">プロンプトを各AIモデル用に最適化・整形</p>
        </header>

        <div class="controls">
            <div class="control-group">
                <label for="model-select">AIモデルを選択</label>
                <select id="model-select">
                    <option value="chatgpt">ChatGPT (GPT-4/GPT-3.5)</option>
                    <option value="claude">Claude (Anthropic)</option>
                    <option value="gemini">Gemini (Google)</option>
                </select>
            </div>

            <div class="control-group">
                <label>アクション</label>
                <div class="button-group">
                    <button onclick="formatPrompt()">✨ 整形</button>
                    <button onclick="clearAll()">🗑️ クリア</button>
                </div>
            </div>
        </div>

        <div class="editor-container">
            <div class="editor-box">
                <div class="editor-header">
                    <h2>📝 入力</h2>
                    <span class="stats" id="input-stats">0文字 | ~0トークン</span>
                </div>
                <textarea
                    id="input-text"
                    placeholder="ここにプロンプトを入力してください..."
                    oninput="updateStats('input')"></textarea>
            </div>

            <div class="editor-box">
                <div class="editor-header">
                    <h2>✅ 整形後</h2>
                    <div style="display: flex; gap: 0.5rem; align-items: center;">
                        <span class="stats" id="output-stats">0文字 | ~0トークン</span>
                        <button class="copy-btn" onclick="copyOutput()">📋 コピー</button>
                    </div>
                </div>
                <textarea
                    id="output-text"
                    placeholder="整形結果がここに表示されます..."
                    readonly></textarea>
            </div>
        </div>

        <div class="tips">
            <h3>💡 使い方</h3>
            <ul>
                <li><span class="highlight">入力エリア</span>にプロンプトを入力</li>
                <li><span class="highlight">AIモデル</span>を選択（各モデルに最適化）</li>
                <li><span class="highlight">整形</span>ボタンで整形実行</li>
                <li><span class="highlight">コピー</span>ボタンでクリップボードにコピー</li>
            </ul>
            <p style="margin-top: 1rem; color: var(--text-secondary); font-size: 0.9rem;">
                ※ トークン数は概算です（日本語: 1文字≈0.5トークン、英語: 1単語≈1トークン）
            </p>
        </div>

        <footer>
            <p>Made by <a href="https://github.com/taka3693" target="_blank">BOSS</a> | <a href="https://github.com/taka3693/app-factory" target="_blank">GitHub</a></p>
        </footer>
    </div>

    <script>
        // Theme toggle
        function toggleTheme() {
            const body = document.body;
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            body.setAttribute('data-theme', newTheme);

            const btn = document.querySelector('.theme-toggle');
            btn.textContent = newTheme === 'light' ? '☀️' : '🌙';

            // Save preference
            try {
                localStorage.setItem('theme', newTheme);
            } catch (e) {
                // localStorage not available (e.g., private browsing)
                console.warn('localStorage not available:', e);
            }
        }

        // Load saved theme
        function loadTheme() {
            let savedTheme = 'dark';
            try {
                savedTheme = localStorage.getItem('theme') || 'dark';
            } catch (e) {
                // localStorage not available
                console.warn('localStorage not available:', e);
            }
            document.body.setAttribute('data-theme', savedTheme);
            const btn = document.querySelector('.theme-toggle');
            if (btn) {
                btn.textContent = savedTheme === 'light' ? '☀️' : '🌙';
            }
        }

        // トークン概算
        function estimateTokens(text) {
            if (!text) return 0;

            // 日本語と英語で分けて計算
            const japaneseChars = text.match(/[\u3040-\u30ff\u4e00-\u9faf\u3005-\u3006]/g) || [];
            const otherChars = text.replace(/[\u3040-\u30ff\u4e00-\u9faf\u3005-\u3006]/g, '').split(/\s+/).filter(w => w.length > 0);

            const jpTokens = japaneseChars.length * 0.5;
            const enTokens = otherChars.length;

            return Math.ceil(jpTokens + enTokens);
        }

        // 統計更新
        function updateStats(type) {
            if (type === 'input') {
                const text = document.getElementById('input-text').value;
                const chars = text.length;
                const tokens = estimateTokens(text);
                document.getElementById('input-stats').textContent = `${chars}文字 | ~${tokens}トークン`;
            } else {
                const text = document.getElementById('output-text').value;
                const chars = text.length;
                const tokens = estimateTokens(text);
                document.getElementById('output-stats').textContent = `${chars}文字 | ~${tokens}トークン`;
            }
        }

        // プロンプト整形
        function formatPrompt() {
            const input = document.getElementById('input-text').value;
            const model = document.getElementById('model-select').value;

            if (!input.trim()) {
                alert('プロンプトを入力してください');
                return;
            }

            let formatted = input;

            // モデル別の整形ルール
            switch (model) {
                case 'chatgpt':
                    // ChatGPT: セクションを明確に、箇条書きを整理
                    formatted = formatForChatGPT(formatted);
                    break;
                case 'claude':
                    // Claude: 自然な会話形式、XMLタグでセクション分け
                    formatted = formatForClaude(formatted);
                    break;
                case 'gemini':
                    // Gemini: シンプルで明確、マークダウン形式
                    formatted = formatForGemini(formatted);
                    break;
            }

            document.getElementById('output-text').value = formatted;
            updateStats('output');
        }

        // ChatGPT用整形
        function formatForChatGPT(text) {
            // 余分な空白を整理
            let formatted = text.trim().replace(/\n{3,}/g, '\n\n');

            // 箇条書きを統一
            formatted = formatted.replace(/^(\s*)[-•]\s*/gm, '$1• ');
            formatted = formatted.replace(/^(\s*)\d+\.\s*/gm, '$1• ');

            // セクションヘッダーを強調
            formatted = formatted.replace(/^(#{1,3}\s.*)$/gm, '\n$1\n');

            return formatted.trim();
        }

        // Claude用整形
        function formatForClaude(text) {
            // 自然な会話形式に
            let formatted = text.trim();

            // XMLタグでセクション分け
            if (formatted.includes('背景') || formatted.includes('コンテキスト')) {
                formatted = formatted.replace(/(背景|コンテキスト)[：:]\s*/gi, '<context>\n$&');
                formatted = formatted.replace(/(タスク|目的|やりたいこと)[：:]\s*/gi, '</context>\n<task>\n$&');
                formatted = formatted.replace(/(制約|条件|注意点)[：:]\s*/gi, '</task>\n<constraints>\n$&');
                formatted += '\n</constraints>';
            }

            return formatted.trim();
        }

        // Gemini用整形
        function formatForGemini(text) {
            // シンプルで明確に
            let formatted = text.trim().replace(/\n{3,}/g, '\n\n');

            // マークダウン形式に統一
            formatted = formatted.replace(/^#+\s*(.*)$/gm, '## $1');
            formatted = formatted.replace(/^\*\*(.+?)\*\*$/gm, '## $1');

            // 箇条書きを統一
            formatted = formatted.replace(/^(\s*)[-•]\s*/gm, '$1- ');

            return formatted.trim();
        }

        // コピー機能
        async function copyOutput() {
            const output = document.getElementById('output-text').value;
            if (!output.trim()) {
                alert('コピーする内容がありません');
                return;
            }

            try {
                await navigator.clipboard.writeText(output);
                const btn = document.querySelector('.copy-btn');
                btn.textContent = '✅ コピー済み';
                btn.classList.add('copied');

                setTimeout(() => {
                    btn.textContent = '📋 コピー';
                    btn.classList.remove('copied');
                }, 2000);
            } catch (err) {
                // Fallback for older browsers
                const textarea = document.getElementById('output-text');
                textarea.select();
                document.execCommand('copy');
                alert('コピーしました');
            }
        }

        // クリア
        function clearAll() {
            if (confirm('すべての内容をクリアしますか？')) {
                document.getElementById('input-text').value = '';
                document.getElementById('output-text').value = '';
                updateStats('input');
                updateStats('output');
            }
        }

        // 初期化
        document.addEventListener('DOMContentLoaded', () => {
            try {
                loadTheme();
                updateStats('input');
                updateStats('output');
            } catch (e) {
                console.error('Initialization error:', e);
                // Fallback: set default values
                const inputStats = document.getElementById('input-stats');
                const outputStats = document.getElementById('output-stats');
                if (inputStats) inputStats.textContent = '0文字 | ~0トークン';
                if (outputStats) outputStats.textContent = '0文字 | ~0トークン';
            }
        });
    </script>
</body>
</html>
